<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>반배정 프로그램 (구글 시트 연동)</title>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    input, textarea, button { font-family: 'Noto Sans KR', sans-serif; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pop { from { opacity:0; transform:scale(0.88); } to { opacity:1; transform:scale(1); } }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-7px)} 40%{transform:translateX(7px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
    .card { animation: fadeUp 0.6s ease both; }
    .result-pop { animation: pop 0.45s cubic-bezier(.34,1.56,.64,1) both; }
    .shake { animation: shake 0.4s ease both; }
    input:focus { outline: none; border-color: #c0392b !important; box-shadow: 0 0 0 3px rgba(192,57,43,0.1) !important; }
    button:active { transform: scale(0.98); }
    
    .manual-box { background: #fdf0ec; padding: 16px; border-radius: 4px; border: 1.5px dashed #e8b4a0; margin-bottom: 16px; font-size: 13px; color: #7a5c50; line-height: 1.6; }
    .manual-title { font-weight: bold; color: #c0392b; margin-bottom: 8px; font-size: 14px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const ADMIN_PASSWORD = "teacher1234";

    function App() {
      const [name, setName] = useState("");
      const [result, setResult] = useState(null); 
      const [students, setStudents] = useState({});
      const [sheetUrl, setSheetUrl] = useState("");

      const [showAdminLogin, setShowAdminLogin] = useState(false);
      const [adminUnlocked, setAdminUnlocked] = useState(false);
      const [pwInput, setPwInput] = useState("");
      const [pwError, setPwError] = useState(false);
      
      const [inputUrl, setInputUrl] = useState("");
      const [saveStatus, setSaveStatus] = useState("");
      const [loading, setLoading] = useState(true);

      const inputRef = useRef(null);

      useEffect(() => {
        const savedUrl = localStorage.getItem("google-sheet-url");
        if (savedUrl) {
          setSheetUrl(savedUrl);
          fetchDataFromSheet(savedUrl);
        } else {
          setLoading(false);
        }
      }, []);

      // 💡 여기가 가장 강력하게 업그레이드된 데이터 수집 로직!
      const fetchDataFromSheet = async (url) => {
        setLoading(true);
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error("네트워크 에러");
          
          // 한글 깨짐 방지: 파일을 문자(Text)로 바로 읽어옵니다.
          const csvText = await response.text();
          const workbook = XLSX.read(csvText, { type: 'string' });
          const firstSheetName = workbook.SheetNames[0];
          const excelData = XLSX.utils.sheet_to_json(workbook.Sheets[firstSheetName]);

          const newStudents = {};
          let count = 0;

          excelData.forEach(row => {
            let studentName = "";
            let grade = "";
            let cls = "";

            // 띄어쓰기 철벽 방어: 열 제목의 빈칸을 모두 지우고 검사합니다.
            for (let key in row) {
              const cleanKey = key.replace(/\s/g, ''); // 제목에서 스페이스바 제거
              if (cleanKey === "성명" || cleanKey === "이름") studentName = row[key];
              if (cleanKey === "학년") grade = row[key];
              if (cleanKey === "반") cls = row[key];
            }

            if (studentName && cls) {
              let infoText = "";
              if (grade) infoText += `${grade}학년 `;
              infoText += `${cls}반`;
              
              // 학생 이름에 혹시 들어간 띄어쓰기도 깔끔하게 정리해서 저장
              newStudents[String(studentName).trim()] = infoText;
              count++;
            }
          });

          setStudents(newStudents);
          if (count > 0) {
            setSaveStatus(`🎉 구글 시트에서 ${count}명 불러오기 완벽 성공!`);
          } else {
            setSaveStatus(`⚠️ 파일을 읽었지만 명단을 못 찾았습니다. (첫 줄 제목이 '학년, 반, 이름'인지 확인하세요!)`);
          }
        } catch (error) {
          console.error(error);
          setSaveStatus("❌ 링크가 잘못되었거나 구글 시트를 읽을 수 없습니다.");
        }
        setLoading(false);
      };

      const lookup = () => {
        const trimmed = name.trim();
        if (!trimmed) {
          setResult({ found: false, studentName: trimmed, reason: "empty" });
          return;
        }
        if (students[trimmed] !== undefined) {
          setResult({ found: true, studentName: trimmed, cls: String(students[trimmed]) });
        } else {
          setResult({ found: false, studentName: trimmed, reason: "notfound" });
        }
      };

      const tryUnlock = () => {
        if (pwInput === ADMIN_PASSWORD) {
          setAdminUnlocked(true);
          setPwError(false);
          setPwInput("");
          setInputUrl(sheetUrl);
          setSaveStatus("");
        } else {
          setPwError(true);
          setPwInput("");
        }
      };

      const saveUrl = () => {
        const trimmedUrl = inputUrl.trim();
        if (!trimmedUrl) {
          setSaveStatus("❌ 주소를 입력해 주세요.");
          return;
        }
        localStorage.setItem("google-sheet-url", trimmedUrl);
        setSheetUrl(trimmedUrl);
        fetchDataFromSheet(trimmedUrl);
      };

      const refreshData = () => {
        if (sheetUrl) {
          setSaveStatus("🔄 구글 시트에서 최신 데이터를 가져오는 중...");
          fetchDataFromSheet(sheetUrl);
        }
      };

      const lockAdmin = () => {
        setAdminUnlocked(false);
        setShowAdminLogin(false);
        setPwInput("");
        setPwError(false);
        setSaveStatus("");
      };

      if (loading && Object.keys(students).length === 0) {
        return <div style={{textAlign: "center", marginTop: "50px", color: "#7a5c50"}}>📡 구글 시트와 연결 중입니다...</div>;
      }

      return (
        <div style={s.body}>
          <div style={s.header} className="card">
            <div style={s.badge}>2025 새학기 안내</div>
            <h1 style={s.h1}>반배정 <span style={{color:"#c0392b"}}>조회</span></h1>
            <p style={s.subtext}>학생 이름을 입력하시면 배정된 반을 확인하실 수 있습니다.<br/>개인정보 보호를 위해 이름 조회만 제공됩니다.</p>
          </div>

          <div style={s.card} className="card" >
            <div style={{...s.topBar}} />
            <label style={s.label}>학생 이름</label>
            <input
              ref={inputRef}
              style={s.input}
              type="text"
              placeholder="예: 홍길동"
              value={name}
              onChange={e => { setName(e.target.value); setResult(null); }}
              onKeyDown={e => e.key === "Enter" && lookup()}
              autoComplete="off"
            />
            <button style={s.btn} onClick={lookup}>조 회 하 기</button>

            {result && result.found && (
              <div style={s.resultBox} className="result-pop" key={result.studentName}>
                <div style={s.resultName}>{result.studentName} 학생</div>
                <div style={s.resultLabel}>배정 결과</div>
                <div style={{...s.resultNum, fontSize: String(result.cls).length > 5 ? 32 : 50}}>
                  {String(result.cls).includes('반') ? result.cls : `${result.cls}반`}
                </div>
                <div style={s.resultMsg}>새학기를 축하합니다!<br/>담임선생님의 안내를 기다려 주세요.</div>
              </div>
            )}
            {result && !result.found && (
              <div style={s.errorBox} className={result ? "shake" : ""} key={"err"+result.studentName}>
                {result.reason === "empty"
                  ? "이름을 입력해 주세요."
                  : `'${result.studentName}' 학생의 배정 정보를 찾을 수 없습니다.\n이름을 다시 확인하시거나 담임선생님께 문의해 주세요.`}
              </div>
            )}
          </div>

          <div style={{marginTop: 40, width: "100%", maxWidth: 480}}>
            {!showAdminLogin && !adminUnlocked && (
              <div style={{textAlign:"center"}}>
                <button style={s.adminToggleBtn} onClick={() => setShowAdminLogin(true)}>
                  🔒 교사 전용 관리
                </button>
              </div>
            )}

            {showAdminLogin && !adminUnlocked && (
              <div style={s.pwCard} className="card">
                <div style={s.pwTitle}>교사 인증</div>
                <p style={{fontSize:13, color:"#7a5c50", marginBottom:16, lineHeight:1.6}}>관리자 비밀번호를 입력하세요.<br/>학부모님은 이 기능을 사용하실 수 없습니다.</p>
                <input
                  style={{...s.input, marginBottom:0}}
                  type="password"
                  placeholder="비밀번호"
                  value={pwInput}
                  onChange={e => { setPwInput(e.target.value); setPwError(false); }}
                  onKeyDown={e => e.key === "Enter" && tryUnlock()}
                  autoFocus
                />
                {pwError && <div style={{color:"#c0392b", fontSize:12, marginTop:8}}>❌ 비밀번호가 틀렸습니다.</div>}
                <div style={{display:"flex", gap:10, marginTop:14}}>
                  <button style={{...s.btn, flex:1, marginTop:0}} onClick={tryUnlock}>확인</button>
                  <button style={{...s.cancelBtn, flex:0.5}} onClick={() => { setShowAdminLogin(false); setPwError(false); setPwInput(""); }}>취소</button>
                </div>
              </div>
            )}

            {adminUnlocked && (
              <div style={s.adminCard} className="card">
                <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:10}}>
                  <div style={s.pwTitle}>구글 시트 연동 설정 🔓</div>
                  <button style={s.lockBtn} onClick={lockAdmin}>잠금</button>
                </div>
                
                <div className="manual-box">
                  <div className="manual-title">💡 1분 만에 끝나는 설정 가이드</div>
                  1. 구글 스프레드시트에 <strong>'학년, 반, 성명(또는 이름)'</strong>을 적습니다.<br/>
                  2. 상단 메뉴에서 <strong>[파일] - [공유] - [웹에 게시]</strong> 클릭!<br/>
                  3. 문서 전체를 <strong>[CSV]</strong> 형식으로 선택하고 [게시] 클릭!<br/>
                  4. 생성된 <strong>긴 인터넷 주소(링크)</strong>를 복사해서 아래에 붙여넣으면 끝!
                </div>

                <label style={s.label}>구글 시트 웹 게시 링크 (CSV)</label>
                <input
                  style={s.input}
                  type="text"
                  placeholder="https://docs.google.com/spreadsheets/..."
                  value={inputUrl}
                  onChange={e => { setInputUrl(e.target.value); setSaveStatus(""); }}
                />
                
                <div style={{display:"flex", gap:10, marginTop:12}}>
                  <button style={{...s.btn, marginTop:0, flex:1}} onClick={saveUrl}>링크 저장 및 데이터 가져오기</button>
                </div>

                {saveStatus && <div style={{marginTop:10, fontSize:13, textAlign:"center", color: saveStatus.includes("🎉") || saveStatus.includes("✅") ? "#27ae60" : "#c0392b"}}>{saveStatus}</div>}
                
                <div style={{marginTop:20, padding:"12px", background:"#f9f6f3", borderRadius:3, fontSize:12, color:"#7a5c50", display:"flex", justifyContent:"space-between", alignItems:"center"}}>
                  <span>현재 연결된 학생: <strong>{Object.keys(students).length}명</strong></span>
                  <button onClick={refreshData} style={{background:"#d4bfb0", color:"#fff", border:"none", padding:"4px 8px", borderRadius:3, cursor:"pointer", fontSize:11}}>🔄 실시간 새로고침</button>
                </div>
              </div>
            )}
          </div>

          <div style={s.footer}>개인정보 처리방침에 따라 이름 외 정보는 수집되지 않습니다</div>
        </div>
      );
    }

    const s = {
      body: { minHeight: "100vh", background: "linear-gradient(160deg, #f7f3ee 0%, #f0ece6 100%)", fontFamily: "'Noto Sans KR', sans-serif", display: "flex", flexDirection: "column", alignItems: "center", padding: "40px 20px 80px", color: "#2c1810" },
      header: { textAlign: "center", marginBottom: 40, maxWidth: 480, width: "100%" },
      badge: { display: "inline-block", border: "2px solid #c0392b", color: "#c0392b", fontFamily: "'Noto Serif KR', serif", fontSize: 11, letterSpacing: 4, padding: "5px 16px", marginBottom: 14 },
      h1: { fontFamily: "'Noto Serif KR', serif", fontSize: "clamp(26px, 5vw, 38px)", fontWeight: 700, lineHeight: 1.3, color: "#2c1810" },
      subtext: { marginTop: 10, fontSize: 14, color: "#7a5c50", fontWeight: 300, lineHeight: 1.8 },
      card: { background: "#fffdf9", border: "1px solid #d4bfb0", borderRadius: 4, padding: "36px 36px 32px", width: "100%", maxWidth: 480, boxShadow: "0 4px 24px rgba(44,24,16,0.10)", position: "relative" },
      topBar: { position: "absolute", top: 0, left: 0, right: 0, height: 3, background: "linear-gradient(90deg, #c0392b, #e8b4a0)", borderRadius: "4px 4px 0 0" },
      label: { display: "block", fontSize: 13, fontWeight: 500, color: "#7a5c50", marginBottom: 8, letterSpacing: 0.5 },
      input: { width: "100%", padding: "14px 16px", fontSize: 16, border: "1.5px solid #d4bfb0", borderRadius: 3, background: "#fff", color: "#2c1810", transition: "border-color 0.2s", marginBottom: 0 },
      btn: { marginTop: 18, width: "100%", padding: 15, background: "#c0392b", color: "#fff", fontSize: 15, fontWeight: 500, border: "none", borderRadius: 3, cursor: "pointer", letterSpacing: 2, transition: "background 0.2s" },
      cancelBtn: { padding: "14px 16px", background: "none", border: "1.5px solid #d4bfb0", borderRadius: 3, color: "#7a5c50", fontSize: 14, cursor: "pointer" },
      resultBox: { marginTop: 24, border: "1.5px solid #d4bfb0", borderRadius: 3, padding: "24px 20px", textAlign: "center", background: "linear-gradient(135deg, #fff 60%, #fdf0ec)" },
      resultName: { fontSize: 13, color: "#7a5c50", marginBottom: 4 },
      resultLabel: { fontFamily: "'Noto Serif KR', serif", fontSize: 12, color: "#c0392b", letterSpacing: 2, marginBottom: 8 },
      resultNum: { fontFamily: "'Noto Serif KR', serif", fontWeight: 700, color: "#2c1810", lineHeight: 1.2, wordBreak: "keep-all" },
      resultMsg: { marginTop: 12, fontSize: 13, color: "#7a5c50", lineHeight: 1.7 },
      errorBox: { marginTop: 24, padding: "16px 18px", background: "#fff5f5", border: "1.5px solid #f5c6c6", borderRadius: 3, fontSize: 14, color: "#c0392b", textAlign: "center", lineHeight: 1.7, whiteSpace: "pre-line" },
      adminToggleBtn: { background: "none", border: "1px solid #d4bfb0", color: "#7a5c50", fontSize: 12, padding: "8px 20px", borderRadius: 20, cursor: "pointer", letterSpacing: 1, transition: "all 0.2s" },
      pwCard: { background: "#fffdf9", border: "1px solid #d4bfb0", borderRadius: 4, padding: "28px 32px", boxShadow: "0 2px 12px rgba(44,24,16,0.08)", position: "relative" },
      pwTitle: { fontFamily: "'Noto Serif KR', serif", fontSize: 16, fontWeight: 700, marginBottom: 10, color: "#2c1810" },
      adminCard: { background: "#fffdf9", border: "1px solid #d4bfb0", borderRadius: 4, padding: "28px 32px", boxShadow: "0 2px 12px rgba(44,24,16,0.08)" },
      lockBtn: { background: "none", border: "1px solid #d4bfb0", color: "#7a5c50", fontSize: 12, padding: "4px 12px", borderRadius: 10, cursor: "pointer" },
      footer: { marginTop: 60, fontSize: 11, color: "#7a5c50", opacity: 0.5, letterSpacing: 1, textAlign: "center" }
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
